name: Refresh smart-money analytics snapshots

on:
  workflow_dispatch:

jobs:
  refresh-cohort-exposure:
    runs-on: ubuntu-latest
    steps:
      - name: Call production cohort exposure refresh manually
        env:
          JOB_SECRET: ${{ secrets.JOB_SECRET }}
        run: |
          test -n "$JOB_SECRET"
          curl --fail-with-body --silent --show-error --request POST \
            --header "x-job-secret: ${JOB_SECRET}" \
            "https://smart-money-specialists.vercel.app/api/smart-money/live/refresh?mode=cohort-exposure&cohortLimit=250&marketLimit=100&positionPageLimit=3"
